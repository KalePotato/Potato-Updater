name: Draft release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-draft:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Validate release endpoint profile
        shell: pwsh
        env:
          POTATO_SYNC_BASE_URL: ${{ secrets.POTATO_SYNC_BASE_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:POTATO_SYNC_BASE_URL)) {
            throw 'Configure the POTATO_SYNC_BASE_URL repository secret before creating a release tag.'
          }

      - name: Audit, test, and build
        shell: pwsh
        env:
          POTATO_SYNC_BASE_URL: ${{ secrets.POTATO_SYNC_BASE_URL }}
        run: |
          .\tools\repository-audit.ps1
          .\tools\build-release.ps1

      - name: Create or update draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/* --clobber
          } else {
            gh release create $tag dist/* --draft --generate-notes --title "Potato Updater $tag"
          }
